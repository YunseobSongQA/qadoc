# Cloudflare Pages 설정 (정적 사이트 + Pages Functions)
# 로컬에서 LLM 검토까지 돌리려면:  npx wrangler pages dev .
# (정적만 보려면 python3 -m http.server 로도 충분 — 그때 LLM 검토는 자동으로 룰 결과로 fallback)

name = "qadoc"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

# Workers AI 바인딩 (무료 티어, 카드 불필요) — functions/api/review.js 에서 env.AI 로 사용
[ai]
binding = "AI"

# 환경변수 / Secret
#  - LLM_PROVIDER : cloudflare(기본) | anthropic
#  - ANTHROPIC_API_KEY : anthropic provider로 교체할 때만 필요 (Secret으로 관리, 코드/깃에 절대 커밋 금지)
#
# 로컬 개발: .dev.vars 파일 (.dev.vars.example 참고)
# 배포:     wrangler pages secret put ANTHROPIC_API_KEY
#           Cloudflare 대시보드 > Pages > 프로젝트 > Settings > Environment variables
[vars]
LLM_PROVIDER = "cloudflare"
