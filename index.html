<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QADOC — TC·기획서 표준 작성</title>
  <meta name="description" content="QADOC — TC(테스트케이스)와 기획서를 공통 기준으로 작성·검토하는 표준화 도구. 누가 작성하든 동일한 기준으로 문서 품질을 맞춥니다." />
  <meta name="theme-color" content="#3b5bdb" />
  <meta property="og:title" content="QADOC — TC·기획서 표준 작성/검토" />
  <meta property="og:description" content="누가 작성하든 공통 기준으로 작성·검토되는 QA 문서 표준화 서비스." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%233b5bdb'/%3E%3Ctext x='16' y='22' font-size='16' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'%3EQ%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="src/css/styles.css" />
  <!-- SheetJS (Excel 내보내기) / PptxGenJS (PPT 내보내기) — 클라이언트 사이드 -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">QADOC</span>
      <span class="brand-sub">TC · 기획서 표준 작성 / 검토</span>
    </div>
    <div class="header-actions">
      <span class="pilot-badge">PILOT</span>
    </div>
  </header>

  <main class="layout">
    <!-- 좌측: 문서 목록 -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <button class="btn btn-primary block" data-action="new-testcase">+ 새 테스트케이스</button>
        <button class="btn btn-primary block" data-action="new-spec">+ 새 기획서</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">내 문서</div>
        <ul id="doc-list" class="doc-list"></ul>
      </div>
      <div class="sidebar-section">
        <label class="btn btn-ghost block" for="preset-file">⬆ 양식(프리셋) 가져오기</label>
        <input type="file" id="preset-file" accept="application/json" hidden />
        <p class="hint">회사 양식 JSON을 업로드하면 작성 폼에 반영됩니다.</p>
      </div>
      <div class="sidebar-section">
        <button class="btn btn-ghost block" data-action="rules-open">⚙ 검토 기준 편집</button>
        <p class="hint">룰을 화면에서 추가/수정하고 버전으로 관리·전환합니다.</p>
      </div>
      <div class="sidebar-section sidebar-footer">
        <a href="about.html">소개</a> · <a href="privacy.html">개인정보</a> · <a href="terms.html">약관</a> · <a href="contact.html">문의</a>
      </div>
    </aside>

    <!-- 중앙: 편집 -->
    <section class="editor-area">
      <div id="editor"></div>
    </section>

    <!-- 우측: 검토 결과 -->
    <aside class="review-panel">
      <div class="review-header">검토 결과</div>
      <div id="review-output" class="review-output">
        <p class="muted">작성 후 <strong>검토</strong> 버튼을 눌러보세요.</p>
      </div>
    </aside>
  </main>

  <!-- 데이터 (프리셋 / 룰셋) — 코드 수정 없이 교체/업로드 가능 -->
  <script src="src/data/presets.js"></script>
  <script src="src/data/rulesets.js"></script>
  <!-- 로직 모듈 -->
  <script src="src/js/storage.js"></script>
  <script src="src/js/review-engine.js"></script>
  <script src="src/js/rules-store.js"></script>
  <script src="src/js/review-llm.js"></script>
  <script src="src/js/export-excel.js"></script>
  <script src="src/js/export-ppt.js"></script>
  <script src="src/js/share.js"></script>
  <script src="src/js/app.js"></script>
</body>
</html>
